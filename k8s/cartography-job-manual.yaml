# One-time manual job - run with: kubectl apply -f k8s/cartography-job-manual.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: cartography-manual-sync
  namespace: cartography
  labels:
    app: cartography
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 7200
  template:
    metadata:
      labels:
        app: cartography
    spec:
      restartPolicy: Never
      containers:
        - name: cartography
          image: gambitcyber/cartography-gc:1.0.1
          imagePullPolicy: Always
          args:
            - "--aws-access-key-id"
            - "REPLACE_ME"
            - "--aws-secret-access-key"
            - "REPLACE_ME"
            - "--aws-default-region"
            - "eu-north-1"
            - "--graph-backend"
            - "memgraph"
            - "--neo4j-uri"
            - "bolt://memgraph.cartography.svc.cluster.local:7687"
            - "--selected-modules"
            - "aws"
            - "--aws-regions"
            - "eu-north-1"
            - "--es-cluster-nodes"
            - "localhost:9200"
            - "--es-username"
            - "elastic"
            - "--es-password"
            - "REPLACE_ME"
            - "--es-document-id"
            - "REPLACE_ME"
            - "-v"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
