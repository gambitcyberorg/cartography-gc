apiVersion: v1
kind: Secret
metadata:
  name: cartography-secrets
  namespace: cartography
type: Opaque
stringData:
  # AWS Credentials
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
  # Neo4j/Memgraph password (leave empty if no auth)
  NEO4J_PASSWORD: ""
  # Elasticsearch password
  ES_PASSWORD: "REPLACE_ME"
  # Findings API bearer token
  FINDINGS_API_TOKEN: "REPLACE_ME"
