---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memgraph-data
  namespace: cartography
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memgraph
  namespace: cartography
  labels:
    app: memgraph
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: memgraph
  template:
    metadata:
      labels:
        app: memgraph
    spec:
      securityContext:
        fsGroup: 103
        runAsUser: 101
        runAsGroup: 103
      containers:
        - name: memgraph
          image: memgraph/memgraph:latest
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7444
              name: monitoring
          args:
            - "--bolt-port=7687"
            - "--log-level=WARNING"
          volumeMounts:
            - name: memgraph-data
              mountPath: /var/lib/memgraph
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
      volumes:
        - name: memgraph-data
          persistentVolumeClaim:
            claimName: memgraph-data

---
apiVersion: v1
kind: Service
metadata:
  name: memgraph
  namespace: cartography
  labels:
    app: memgraph
spec:
  selector:
    app: memgraph
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: monitoring
      port: 7444
      targetPort: 7444
